<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      href="/favicon.ico" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <title>Vite App</title>
    <script>
      if (
        window.matchMedia &&
        window.matchMedia('(prefers-color-scheme: dark)').matches
      ) {
        document.documentElement.classList.add('dark-mode');
      } else {
        document.documentElement.classList.add('light-mode');
      }
    </script>
  </head>
  <body>
    <div id="app">
      <style>
        html.dark-mode {
          background: #000;
          color: #fff;
        }
        html.light-mode {
          background: #fff;
          color: #000;
        }
      </style>
    </div>
    <script
      type="module"
      src="/src/main.js"></script>
  </body>
</html>
